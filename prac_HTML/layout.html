<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Titleprac</title>
</head>
<body>
<div style="
background-color: #aaecda;
padding: 50px;
/*
        padding-top, padding-right, padding-bottom, padding-left
*/
margin: 30px;">
이것은 div입니다.</div>
<div style="
background-color: #ecabd8;
padding: 100px 50px 10px 30px;">
    이것은 div입니다</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #d9534f;">1. context-box 기본값</h3>
    <div style="
        width: 200px;
        height: 100px;
        padding: 20px;
        background-color: #ffcccc;
    ">
        전체 너비 : 260px
    </div>
</div>

<div style="margin: 50px;">
    <h3 style="color: #d9534f">2. border-box</h3>
    <div style="
        box-sizing: border-box;
        width: 200px;
        height: 100px;
        padding: 20px;
        border: 10px solid #333;
        background-color: #ffcccc;
    ">
        전체 너비: 200px
    </div>
</div>
</body>
</html>
