<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="font-size: 34px; background-color: #ff0000;
color: white;">
  여기는 div입니다.
</div>

<div style="font-weight: bold;">이건 font-weight를 bold로 했습니다.</div>
<div style="font-weight: lighter;">이건 font-weight를 lighter로 했습니다.</div>
<div style="font-weight: normal;">이건 font-weight를 normal로 했습니다.</div>
<div style="font-weight: bolder;">이건 font-weight를 bolder로 했습니다.</div>
<div style="font-weight: 100;">이건 font-weight를 100으로 했습니다.</div>
<div style="font-weight: 900;">이건 font-weight를 900으로 했습니다.</div>

<div style="font-style: italic;">이건 이텔릭체를 표기합니다.</div>
<div style="text-decoration: underline;">이건 밑줄을 표기합니다.</div>
<div style="text-decoration: line-through;">이건 취소선 표기</div>
</body>
</html>
